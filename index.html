<script>
    const whatsappNumber = "917009719553";
    // IMPORTANT: Ensure this URL ends with output=csv
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTqx0OguiRTd1gUbV61Kdzafa2dNYuqTpw89NkM-qRIUGnK97VWI3PE1JKuhX1ynAvQEbAzJJUAcZl9/pub?gid=0&single=true&output=csv
'; 

    // 2. State Management
let selectedSizes = {}; 

// 3. Size Selection Function
window.selectSize = function(prodIndex, size, btn) {
    selectedSizes[prodIndex] = size;
    
    // UI Update
    const card = btn.closest('.product-card');
    card.querySelectorAll('.size-btn').forEach(b => {
        b.classList.remove('bg-indigo-600', 'text-white');
        b.classList.add('bg-white', 'text-gray-900');
    });
    btn.classList.remove('bg-white', 'text-gray-900');
    btn.classList.add('bg-indigo-600', 'text-white');

    // Update WhatsApp Link
    const buyBtn = document.getElementById(`buy-link-${prodIndex}`);
    const name = buyBtn.getAttribute('data-name');
    buyBtn.href = `https://wa.me/${whatsappNumber}?text=Hi, I want to order ${name} (Size: ${size})`;
};

// 4. Main Data Loading Function
function loadProducts() {
    console.log("Starting to fetch data from Google Sheets...");

    Papa.parse(sheetUrl, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            console.log("Data received:", results.data);
            
            const loader = document.getElementById('loading');
            if(loader) loader.style.display = 'none';

            const container = document.getElementById('product-container');
            const products = results.data;

            products.forEach((product, index) => {
                // QA Check: Skip if name is missing
                if(!product.name) return;

                // Data Formatting
                const name = product.name.trim();
                const price = product.price ? product.price.trim() : "TBD";
                const desc = product.description ? product.description.trim() : "";
                const imgArray = product.images ? product.images.split(',') : [];
                const mainImg = imgArray.length > 0 ? imgArray[0].trim() : "https://via.placeholder.com/400x500";
                const sizes = product.sizes ? product.sizes.split(',') : [];

                // Build Size Buttons
                const sizeHtml = sizes.map(s => {
                    const sz = s.trim();
                    return `<button onclick="selectSize(${index}, '${sz}', this)" 
                            class="size-btn border border-gray-200 px-3 py-1 rounded text-sm font-bold hover:border-indigo-600 transition">
                            ${sz}</button>`;
                }).join('');

                // Injecting HTML Card
                const card = `
                <div class="product-card bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden flex flex-col">
                    <div class="relative aspect-[3/4] bg-gray-100">
                        <img id="main-img-${index}" src="${mainImg}" class="w-full h-full object-cover">
                    </div>
                    <div class="p-5 flex-grow">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="text-lg font-bold text-gray-800">${name}</h3>
                            <span class="text-lg font-black text-indigo-600">${price}</span>
                        </div>
                        <p class="text-gray-500 text-xs mb-4 line-clamp-2">${desc}</p>
                        
                        <div class="mb-6">
                            <p class="text-[10px] font-bold text-gray-400 uppercase mb-2">Select Size</p>
                            <div class="flex flex-wrap gap-2">${sizeHtml}</div>
                        </div>

                        <a id="buy-link-${index}" data-name="${name}" 
                           href="https://wa.me/${whatsappNumber}?text=Hi, I want to order ${name}" 
                           target="_blank" 
                           class="block w-full py-3 bg-indigo-600 text-white text-center font-bold rounded-xl hover:bg-indigo-700 transition">
                            Order via WhatsApp
                        </a>
                    </div>
                </div>`;

                container.insertAdjacentHTML('beforeend', card);
            });
        },
        error: function(err) {
            console.error("Critical Error loading CSV:", err);
            alert("Failed to load products. Check console for details.");
        }
    });
}

// 5. Initialize
window.onload = loadProducts;
</script>
