<script>
    const whatsappNumber = "917009719553";
    // IMPORTANT: Ensure this URL ends with output=csv
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTqx0OguiRTd1gUbV61Kdzafa2dNYuqTpw89NkM-qRIUGnK97VWI3PE1JKuhX1ynAvQEbAzJJUAcZl9/pub?gid=0&single=true&output=csv
'; 

    let selectedSizes = {}; 

    function selectSize(prodIndex, size, btn) {
        selectedSizes[prodIndex] = size;
        const card = btn.closest('.product-card');
        card.querySelectorAll('.size-btn').forEach(b => {
            b.style.backgroundColor = 'white';
            b.style.color = 'black';
        });
        btn.style.backgroundColor = '#4f46e5';
        btn.style.color = 'white';

        const buyBtn = document.getElementById(`buy-link-${prodIndex}`);
        const prodName = buyBtn.getAttribute('data-name');
        buyBtn.href = `https://wa.me/${whatsappNumber}?text=Hi, I want to order ${prodName} in Size: ${size}`;
    }

    function loadProducts() {
        Papa.parse(sheetUrl, {
            download: true,
            header: true,
            complete: function(results) {
                const loadingElement = document.getElementById('loading');
                if(loadingElement) loadingElement.style.display = 'none';

                const products = results.data;
                const container = document.getElementById('product-container');

                products.forEach((product, index) => {
                    if(!product.name) return;

                    const allImages = product.images ? product.images.split(',') : [];
                    const mainImage = allImages.length > 0 ? allImages[0].trim() : "https://via.placeholder.com/400x500?text=No+Image";

                    const sizeButtons = product.sizes ? product.sizes.split(',').map(s => {
                        const sz = s.trim();
                        return `<button onclick="selectSize(${index}, '${sz}', this)" class="size-btn border border-gray-200 px-3 py-1.5 rounded-md text-sm font-semibold">${sz}</button>`;
                    }).join('') : "";

                    // Using a cleaner way to build the HTML to avoid Syntax Errors
                    const htmlContent = `
                        <div class="product-card bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden flex flex-col">
                            <div class="relative aspect-[3/4]">
                                <img id="main-img-${index}" src="${mainImage}" class="w-full h-full object-cover">
                            </div>
                            <div class="p-6">
                                <div class="flex justify-between items-start mb-2">
                                    <h3 class="text-xl font-bold">${product.name}</h3>
                                    <span class="text-xl font-extrabold text-indigo-600">${product.price}</span>
                                </div>
                                <p class="text-gray-500 text-sm mb-4">${product.description}</p>
                                <div class="flex flex-wrap gap-2 mb-6">${sizeButtons}</div>
                                <a id="buy-link-${index}" data-name="${product.name}" href="https://wa.me/${whatsappNumber}" target="_blank" class="block w-full text-center bg-indigo-600 text-white font-bold py-3 rounded-xl">
                                    Order via WhatsApp
                                </a>
                            </div>
                        </div>`;
                    
                    container.innerHTML += htmlContent;
                });
            },
            error: function(err) {
                console.error("PapaParse Error:", err);
            }
        });
    }

    window.onload = loadProducts;
</script>
